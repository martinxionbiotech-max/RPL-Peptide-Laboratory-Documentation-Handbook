{% if "search" in config.plugins %}
  <div
    class="md-search"
    data-md-component="search"
    role="dialog"
    aria-label="Site search"
  >

    <label class="md-search__overlay" for="__search"></label>

    <div class="md-search__inner" role="search">

      <form
        class="md-search__form"
        name="search"
        role="search"
        aria-label="Search documentation"
      >

        <input
          class="md-search__input"
          name="query"
          type="search"
          placeholder="{{ lang.t('search.placeholder') }}"
          aria-label="{{ lang.t('search.placeholder') }}"
          autocapitalize="off"
          autocorrect="off"
          autocomplete="off"
          spellcheck="false"
          required
        >

        <label class="md-search__icon md-icon" for="__search">
          {% include ".icons/material/magnify.svg" %}
        </label>

        <button
          type="reset"
          class="md-search__icon md-icon"
          title="{{ lang.t('search.reset') }}"
          aria-label="{{ lang.t('search.reset') }}"
          tabindex="-1"
        >
          {% include ".icons/material/close.svg" %}
        </button>

      </form>


      <div
        class="md-search__output"
        data-md-component="search-output"
      >

        <div
          class="md-search__scrollwrap"
          tabindex="0"
          data-md-scrollfix
        >

          <div
            class="md-search-result"
            data-md-component="search-result"
          >

            <div class="md-search-result__meta">
              {{ lang.t("search.result.placeholder") }}
            </div>

            <ol
              class="md-search-result__list"
              role="list"
            >
            </ol>

          </div>

        </div>

      </div>

    </div>

  </div>
{% endif %}
