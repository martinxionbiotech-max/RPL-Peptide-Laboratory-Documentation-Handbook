site_name: Documentation Center

site_description: Technical Documentation and Knowledge Base

theme:
  name: material

nav:
  - Home: index.md

  - Products:
      - Product Documentation: products/index.md

  - Technical Sheets:
      - Tech Sheets: tech-sheets/index.md

  - FAQ:
      - Frequently Asked Questions: faq/index.md


plugins:
  - search


markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - footnotes


extra:
  generator: false